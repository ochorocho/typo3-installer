# Enable PHAR file execution
# This file is included in the main nginx server block

# Handle .phar files as PHP scripts with PATH_INFO support
location ~ ^(.+\.phar)(/.*)$ {
    fastcgi_split_path_info ^(.+\.phar)(/.*)$;
    set $phar_file $1;
    set $path_info $2;

    # Check if the .phar file exists
    if (!-f $document_root$phar_file) {
        return 404;
    }

    fastcgi_param SCRIPT_FILENAME $document_root$phar_file;
    fastcgi_param PATH_INFO $path_info;
    fastcgi_param SCRIPT_NAME $phar_file;
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_pass unix:/run/php-fpm.sock;
}

# Fallback for .phar without PATH_INFO
location ~ \.phar$ {
    try_files $uri =404;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param SCRIPT_NAME $fastcgi_script_name;
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_pass unix:/run/php-fpm.sock;
}
