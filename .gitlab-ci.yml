stages:
  - build      # composer + npm (parallel)
  - analysis   # phpstan + php-cs-fixer (parallel)
  - package    # build PHAR
  - test       # E2E tests

variables:
  # Shared variables for all jobs
  COMPOSER_PUBLIC_DIR: test-installer-root/public/

# =============================================================================
# BUILD STAGE - parallel jobs for dependencies
# =============================================================================

composer-install:
  stage: build
  image: composer:2
  script:
    - composer install --no-interaction --no-dev
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

npm-build:
  stage: build
  image: node:22-slim
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public/
    expire_in: 1 hour

# =============================================================================
# ANALYSIS STAGE - parallel code quality checks
# =============================================================================

phpstan:
  stage: analysis
  image:
    name: ghcr.io/phpstan/phpstan:2-php8.3
    entrypoint: [""]
  needs:
    - composer-install
  script:
    - phpstan analyse src --level=9

php-cs-fixer:
  stage: analysis
  image:
    name: ghcr.io/php-cs-fixer/php-cs-fixer:3-php8.3
    entrypoint: [""]
  needs:
    - composer-install
  script:
    - php-cs-fixer fix --dry-run --diff

# =============================================================================
# PACKAGE STAGE - build the PHAR
# =============================================================================

build-phar:
  stage: package
  image: composer:2
  needs:
    - composer-install
    - npm-build
  script:
    - curl -LSs https://github.com/box-project/box/releases/download/4.6.6/box.phar -o /usr/local/bin/box
    - chmod +x /usr/local/bin/box
    - composer run build:phar
  artifacts:
    name: TYPO3-Installer
    paths:
      - test-installer-root/public/typo3-installer.php
    expire_in: 1 hour

# =============================================================================
# TEST STAGE - E2E tests
# =============================================================================

# Include LAMP testing component for each database type
include:
  # MySQL/MariaDB E2E tests
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-mysql
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql && apt-get update && apt-get install -y libpq-dev libicu-dev libzip-dev unzip libfreetype6-dev libjpeg62-turbo-dev libpng-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install pdo_pgsql intl zip gd"
      database_image: mariadb:10.11
      database_host: db
      database_port: 3306

  # PostgreSQL E2E tests
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-postgresql
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql && apt-get update && apt-get install -y libpq-dev libicu-dev libzip-dev unzip libfreetype6-dev libjpeg62-turbo-dev libpng-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install pdo_pgsql intl zip gd"
      database_image: postgres:16
      database_host: postgres
      database_port: 3333

  # SQLite E2E tests (uses placeholder DB, actual SQLite is in PHP)
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-sqlite
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql && apt-get update && apt-get install -y libpq-dev libicu-dev libzip-dev unzip libfreetype6-dev libjpeg62-turbo-dev libpng-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install pdo_pgsql intl zip gd"
      database_image: mariadb:10.11
      database_host: db

  # PHP 8.4
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-php-84
      stage: test
      php_image: php:8.4-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql && apt-get update && apt-get install -y libpq-dev libicu-dev libzip-dev unzip libfreetype6-dev libjpeg62-turbo-dev libpng-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install pdo_pgsql intl zip gd"
      database_image: mariadb:10.11
      database_host: db

  # PHP 8.5
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-php-85
      stage: test
      php_image: php:8.5-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql && apt-get update && apt-get install -y libpq-dev libicu-dev libzip-dev unzip libfreetype6-dev libjpeg62-turbo-dev libpng-dev && docker-php-ext-configure gd --with-freetype --with-jpeg && docker-php-ext-install pdo_pgsql intl zip gd"
      database_image: mariadb:10.11
      database_host: db

# Override the generated jobs to add our specific configuration
e2e-mysql:
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  needs:
    - build-phar
  timeout: 60 minutes
  variables:
    BASE_URL: http://webserver
    DB_DRIVER: pdo_mysql
    DB_HOST: db
    DB_USER: db
    DB_PASSWORD: db
    DB_NAME: db
    INSTALL_DIR: $CI_PROJECT_DIR/test-installer-root
    CI: "true"
    COMPOSER_PUBLIC_DIR: test-installer-root/public/
    CI_DEBUG_SERVICES: "false"
  script:
    - apt-get update && apt-get install -y postgresql-client default-mysql-client
    - cd tests/e2e && npm ci
    - npx playwright test --project=ui-desktop --project=api --project=mysql
  artifacts:
    when: always
    name: e2e-mysql-results
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
      - test-installer-root/var/log/
    reports:
      junit: tests/e2e/playwright-report/e2e-mysql-playwright.xunit.xml
    expire_in: 7 days

