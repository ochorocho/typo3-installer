# Playwright E2E tests - MySQL
e2e-mysql:
  extends: .ddev_base
  stage: test
  needs:
    - build
  timeout: 15 minutes
  script:
    - ddev playwright
  artifacts:
    when: always
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    expire_in: 7 days

