# =============================================================================
# DEPLOY + LIVE E2E — deploy to real webspaces and test remotely
# =============================================================================
deploy-live-webspaces:
  stage: test
  image: debian:bookworm-slim
  needs:
    - build-phar
  script:
    - apt-get update && apt-get install -y --no-install-recommends curl jq openssh-client bash ca-certificates
    - mkdir -p ~/.ssh && printf "Host *\n\tStrictHostKeyChecking accept-new\n\n" > ~/.ssh/config
    - eval $(ssh-agent -s)
    - printf "%s" "$SSH_PRIVATE_KEY" > /tmp/.key
    - chmod 600 /tmp/.key
    - ssh-add /tmp/.key
    - printf "%s" "$DEPLOY_SERVERS" > ./.deploy-servers.json
    - bash ./scripts/deploy.sh

e2e-live-webspaces:
  extends: .ddev-job
  stage: test
  needs:
    - build-phar
    - deploy-live-webspaces
  timeout: 60 minutes
  script:
    - ddev config --omit-containers=db
    - rm -Rf .ddev/docker-compose.postgres.yaml
    - *ddev-start
    - printf "%s" "$DEPLOY_SERVERS" > ./.deploy-servers.json
    - ddev typo3:reset
    - ddev playwright test --dir=tests/e2e --dir=tests/e2e --project=sqlite tests/full-flows/sqlite.spec.js
  artifacts:
    when: always
    name: e2e-live-results
    paths:
      - tests/e2e/*/playwright-report/
      - tests/e2e/*/test-results/
      - tests/e2e/*/junit.xml
    reports:
      junit: tests/e2e/*/junit.xml
    expire_in: 7 days
