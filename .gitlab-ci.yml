stages:
  - build      # composer + npm (parallel)
  - analysis   # phpstan + php-cs-fixer (parallel)
  - package    # build PHAR
  - test       # E2E tests

variables:
  # Shared variables for all jobs
  COMPOSER_PUBLIC_DIR: test-installer-root/public/

# =============================================================================
# BUILD STAGE - parallel jobs for dependencies
# =============================================================================

composer-install:
  stage: build
  image: composer:2
  script:
    - composer install --no-interaction --no-dev
  artifacts:
    paths:
      - vendor/
    expire_in: 1 hour

npm-build:
  stage: build
  image: node:22-slim
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - public/
    expire_in: 1 hour

# =============================================================================
# ANALYSIS STAGE - parallel code quality checks
# =============================================================================

phpstan:
  stage: analysis
  image:
    name: ghcr.io/phpstan/phpstan:2-php8.3
    entrypoint: [""]
  needs:
    - composer-install
  script:
    - phpstan analyse src --level=9

php-cs-fixer:
  stage: analysis
  image:
    name: ghcr.io/php-cs-fixer/php-cs-fixer:3-php8.3
    entrypoint: [""]
  needs:
    - composer-install
  script:
    - php-cs-fixer fix --dry-run --diff

# =============================================================================
# PACKAGE STAGE - build the PHAR
# =============================================================================

build-phar:
  stage: package
  image: composer:2
  needs:
    - composer-install
    - npm-build
  script:
    - curl -LSs https://github.com/box-project/box/releases/download/4.6.6/box.phar -o /usr/local/bin/box
    - chmod +x /usr/local/bin/box
    - composer run build:phar
  artifacts:
    paths:
      - typo3-installer.phar
      - test-installer-root/public/typo3-installer.phar
    expire_in: 1 hour

# =============================================================================
# TEST STAGE - E2E tests
# =============================================================================

# Include LAMP testing component for each database type
include:
  # MySQL/MariaDB E2E tests
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-mysql
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: "docker-php-ext-install pdo_mysql"
      database_image: mariadb:10.11
      database_host: db

  # PostgreSQL E2E tests
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-postgresql
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: "apt-get update && apt-get install -y libpq-dev && docker-php-ext-install pdo_pgsql"
      database_image: postgres:16
      database_host: postgres

  # SQLite E2E tests (uses placeholder DB, actual SQLite is in PHP)
  - remote: 'https://gitlab.com/ochorocho/lamp-acceptance-testing/-/raw/main/templates/lamp/template.yml'
    inputs:
      name: e2e-sqlite
      stage: test
      php_image: php:8.3-fpm
      php_additional_command: ""
      database_image: mariadb:10.11
      database_host: db

# Override the generated jobs to add our specific configuration
e2e-mysql:
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  needs:
    - build-phar
  timeout: 60 minutes
  variables:
    BASE_URL: http://webserver
    DB_DRIVER: pdo_mysql
    DB_HOST: db
    DB_USER: db
    DB_PASSWORD: db
    DB_NAME: db
    INSTALL_DIR: $CI_PROJECT_DIR/test-installer-root
    CI: "true"
    COMPOSER_PUBLIC_DIR: test-installer-root/
  script:
    - apt-get update && apt-get install -y postgresql-client default-mysql-client
    - cd tests/e2e && npm ci
    - npx playwright test --project=ui-desktop --project=api --project=mysql
  artifacts:
    when: always
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    reports:
      junit: tests/e2e/test-results/junit.xml
    expire_in: 7 days

e2e-postgresql:
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  needs:
    - build-phar
  timeout: 60 minutes
  variables:
    BASE_URL: http://webserver
    DB_DRIVER: pdo_pgsql
    DB_HOST: postgres
    DB_USER: db
    DB_PASSWORD: db
    DB_NAME: db
    INSTALL_DIR: $CI_PROJECT_DIR/test-installer-root
    CI: "true"
    COMPOSER_PUBLIC_DIR: test-installer-root/
  script:
    - apt-get update && apt-get install -y postgresql-client default-mysql-client
    - cd tests/e2e && npm ci
    - npx playwright test --project=postgresql
  artifacts:
    when: always
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    reports:
      junit: tests/e2e/test-results/junit.xml
    expire_in: 7 days

e2e-sqlite:
  image: mcr.microsoft.com/playwright:v1.58.0-noble
  needs:
    - build-phar
  timeout: 60 minutes
  variables:
    BASE_URL: http://webserver
    DB_DRIVER: pdo_sqlite
    DB_HOST: db
    DB_USER: db
    DB_PASSWORD: db
    DB_NAME: db
    INSTALL_DIR: $CI_PROJECT_DIR/test-installer-root
    CI: "true"
    COMPOSER_PUBLIC_DIR: test-installer-root/
  script:
    - apt-get update && apt-get install -y postgresql-client default-mysql-client
    - cd tests/e2e && npm ci
    - npx playwright test --project=sqlite
  artifacts:
    when: always
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    reports:
      junit: tests/e2e/test-results/junit.xml
    expire_in: 7 days
