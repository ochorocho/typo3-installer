stages:
  - build
  - analysis
  - test

variables:
  COMPOSER_PUBLIC_DIR: test-installer-root/public/

# =============================================================================
# DDEV job template — all DDEV-based jobs extend this
# =============================================================================
.ddev-job:
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1
  image:
    name: ghcr.io/ddev/ddev-gitlab-ci:latest
    pull_policy: always
  services:
    - name: docker:dind

# =============================================================================
# Shared script snippets (YAML anchors)
# =============================================================================
.ddev-start: &ddev-start
  - ddev config --auto
  - ddev start

.ddev-build: &ddev-build
  - ddev composer install --no-interaction --no-dev
  - ddev exec "curl -LSs https://github.com/box-project/box/releases/download/4.6.10/box.phar -o /usr/local/bin/box && chmod +x /usr/local/bin/box"
  - ddev composer run build

# =============================================================================
# BUILD STAGE
# =============================================================================
build-phar:
  extends: .ddev-job
  stage: build
  when: always
  needs: []
  script:
    - ddev config --omit-containers=db
    - rm -Rf .ddev/docker-compose.postgres.yaml
    - ddev add-on remove ochorocho/ddev-playwright
    - *ddev-start
    - *ddev-build
  artifacts:
    name: TYPO3-Installer
    paths:
      - test-installer-root/public/typo3-installer.php
    expire_in: 1 hour

# =============================================================================
# ANALYSIS STAGE — run in parallel, need dev dependencies
# =============================================================================
phpstan:
  extends: .ddev-job
  stage: analysis
  needs: []
  script:
    - ddev config --omit-containers=db
    - rm -Rf .ddev/docker-compose.postgres.yaml
    - ddev add-on remove ochorocho/ddev-playwright
    - *ddev-start
    - ddev composer install --no-interaction
    - ddev composer run phpstan
    - ddev stop

php-cs-fixer:
  extends: .ddev-job
  stage: analysis
  needs: []
  script:
    - ddev config --omit-containers=db
    - rm -Rf .ddev/docker-compose.postgres.yaml
    - ddev add-on remove ochorocho/ddev-playwright
    - *ddev-start
    - ddev composer install --no-interaction
    - ddev exec "vendor/bin/php-cs-fixer fix --dry-run --diff"
    - ddev stop

# =============================================================================
# TEST STAGE — E2E tests via DDEV + Playwright addon
# =============================================================================
e2e-mysql:
  extends: .ddev-job
  stage: test
  needs: [build-phar]
  timeout: 60 minutes
  script:
    - rm -Rf .ddev/docker-compose.postgres.yaml
    - *ddev-start
    - ddev typo3:reset
    - ddev playwright test --dir=tests/e2e --project=ui-desktop --project=api --project=mysql
  artifacts:
    when: always
    name: e2e-mysql-results
    paths:
      - tests/e2e/playwright-report/
      - tests/e2e/test-results/
    reports:
      junit: tests/e2e/test-results/junit.xml
    expire_in: 7 days

e2e-postgresql:
