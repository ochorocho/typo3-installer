stages:
  - build
  - test

# Base configuration for DDEV jobs
.ddev_base:
  image: ghcr.io/ddev/ddev-gitlab-ci:v1.24
  services:
    - docker:dind
  variables:
    FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 1
    DOCKER_TLS_CERTDIR: ""
    FF_NETWORK_PER_BUILD: 0
  before_script:
    - ddev start
  after_script:
    - ddev stop

# Build job - builds frontend and PHAR
build:
  extends: .ddev_base
  stage: build
  script:
    - ddev composer install
    - ddev composer run phpstan
    - ddev npm install
    - ddev npm run build
    - ddev composer run build
  artifacts:
    paths:
      - typo3-installer.phar
    expire_in: 1 day

