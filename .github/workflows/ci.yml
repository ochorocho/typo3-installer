name: CI

# =============================================================================
# Triggers: push to main/develop and all pull requests
# (GitLab defaults to all branches; narrowed per project decision.)
# =============================================================================
on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs for the same ref (keeps CI minutes in check)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write        # mikepenz/action-junit-report creates check runs
  pull-requests: write # mikepenz/action-junit-report annotates PRs

env:
  COMPOSER_PUBLIC_DIR: test-installer-root/public/

jobs:
  # ===========================================================================
  # BUILD STAGE
  # ===========================================================================
  build-phar:
    name: build-phar
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Configure project and start DDEV
        run: |
          ddev config --omit-containers=db
          rm -Rf .ddev/docker-compose.postgres.yaml
          ddev add-on remove ochorocho/ddev-playwright
          ddev config --auto
          ddev start

      - name: Build PHAR
        run: |
          ddev composer install --no-interaction --no-dev
          ddev exec "curl -LSs https://github.com/box-project/box/releases/download/4.6.10/box.phar -o /usr/local/bin/box && chmod +x /usr/local/bin/box"
          ddev composer run build

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: TYPO3-Installer
          path: test-installer-root/public/typo3-installer.php
          retention-days: 1
          if-no-files-found: error

  # ===========================================================================
  # ANALYSIS STAGE — runs in parallel with build, needs dev dependencies
  # ===========================================================================
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Configure project and start DDEV
        run: |
          ddev config --omit-containers=db
          rm -Rf .ddev/docker-compose.postgres.yaml
          ddev add-on remove ochorocho/ddev-playwright
          ddev config --auto
          ddev start

      - name: Run PHPStan
        run: |
          ddev composer install --no-interaction
          ddev composer run phpstan

      - name: Stop DDEV
        if: always()
        run: ddev stop

  php-cs-fixer:
    name: php-cs-fixer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Configure project and start DDEV
        run: |
          ddev config --omit-containers=db
          rm -Rf .ddev/docker-compose.postgres.yaml
          ddev add-on remove ochorocho/ddev-playwright
          ddev config --auto
          ddev start

      - name: Run php-cs-fixer
        run: |
          ddev composer install --no-interaction
          ddev exec "vendor/bin/php-cs-fixer fix --dry-run --diff"

      - name: Stop DDEV
        if: always()
        run: ddev stop

  # ===========================================================================
  # TEST STAGE — E2E tests via DDEV + Playwright addon
  # ===========================================================================
  e2e-mysql:
    name: e2e-mysql
    runs-on: ubuntu-latest
    needs: build-phar
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: TYPO3-Installer
          path: test-installer-root/public/

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Configure project and start DDEV
        run: |
          rm -Rf .ddev/docker-compose.postgres.yaml
          ddev config --auto
          ddev start

      - name: Run Playwright (mysql)
        run: |
          ddev exec "cd tests/e2e/ && npm install"
          ddev playwright test --dir=tests/e2e --project=ui-desktop --project=api --project=mysql

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-mysql-results
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 7

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: tests/e2e/test-results/junit.xml
          check_name: e2e-mysql
          require_tests: false

  e2e-postgresql:
    name: e2e-postgresql
    runs-on: ubuntu-latest
