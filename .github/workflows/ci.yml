  # ===========================================================================
  # DEPLOY + LIVE E2E — deploy to real webspaces and test remotely
  # Required secrets: SSH_PRIVATE_KEY, DEPLOY_SERVERS
  # ===========================================================================
  deploy-live-webspaces:
    name: deploy-live-webspaces
    runs-on: ubuntu-latest
    needs: build-phar
    # ubuntu-latest already has curl, jq, openssh-client, bash, ca-certificates
    steps:
      - uses: actions/checkout@v5

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: TYPO3-Installer
          path: test-installer-root/public/

      - name: Configure SSH (accept-new host keys, load private key)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh && printf "Host *\n\tStrictHostKeyChecking accept-new\n\n" > ~/.ssh/config
          eval "$(ssh-agent -s)"
          printf "%s" "$SSH_PRIVATE_KEY" > /tmp/.key
          chmod 600 /tmp/.key
          ssh-add /tmp/.key
          # Persist agent env for later steps in this job
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Write deploy servers config
        env:
          DEPLOY_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: printf "%s" "$DEPLOY_SERVERS" > ./.deploy-servers.json

      - name: Deploy
        run: bash ./scripts/deploy.sh

  e2e-live-webspaces:
    name: e2e-live-webspaces
    runs-on: ubuntu-latest
    needs: [build-phar, deploy-live-webspaces]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - name: Download PHAR artifact
        uses: actions/download-artifact@v4
        with:
          name: TYPO3-Installer
          path: test-installer-root/public/

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Configure project and start DDEV
        run: |
          ddev config --omit-containers=db
          rm -Rf .ddev/docker-compose.postgres.yaml
          ddev config --auto
          ddev start

      - name: Write deploy servers and run remote Playwright
        env:
          DEPLOY_SERVERS: ${{ secrets.DEPLOY_SERVERS }}
        run: |
          printf "%s" "$DEPLOY_SERVERS" > ./.deploy-servers.json
          ddev exec "cd tests/e2e/ && npm install"
          ddev playwright-remote

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-live-results
          path: |
            tests/e2e/*/playwright-report/
            tests/e2e/*/test-results/
            tests/e2e/*/junit.xml
          retention-days: 7

      - name: Publish JUnit report
        if: always()
        uses: mikepenz/action-junit-report@v5
        with:
          report_paths: tests/e2e/*/junit.xml
          check_name: e2e-live-webspaces
          require_tests: false
